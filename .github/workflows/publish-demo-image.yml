name: Publish demo image

# Publishes the Syntra demo image at ghcr.io/sectorops/syntra:demo so the
# Quickstart's `docker run` story works without a from-source build.
#
# The Syntra repo is self-contained: Lycan/ ships as a subdirectory of
# this repo, Syntra's Cargo.toml depends on it via `path = "Lycan"`, and
# Dockerfile.demo's build context is this repo root. No external
# dependency on any other repo at build time.
#
# Tags emitted per run:
#   ghcr.io/sectorops/syntra:demo          — moving tag, latest demo build
#   ghcr.io/sectorops/syntra:demo-<sha>    — immutable, ties an image to a commit

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'examples/predictive-autoscaling/**'
      - 'examples/anomaly-routing/**'
      - 'examples/seasonal-fraud-threshold/**'
      - 'examples/shared-state-action-embeddings/**'
      - 'examples/hierarchical-region-routing/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Lycan/src/**'
      - 'Lycan/Cargo.toml'
      - 'Lycan/Cargo.lock'
      - '.github/workflows/publish-demo-image.yml'
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-demo-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push ghcr.io/sectorops/syntra:demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.demo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner }}/syntra:demo
            ghcr.io/${{ steps.lc.outputs.owner }}/syntra:demo-${{ github.sha }}
          cache-from: type=gha,scope=syntra-demo
          cache-to: type=gha,scope=syntra-demo,mode=max
