{{- if not .Values.syntra.existingSecret }}
{{- if and (not .Values.syntra.adminToken) (not .Values.syntra.devMode) }}
{{- fail "syntra.adminToken is required (set via --set syntra.adminToken=<token>) unless syntra.existingSecret is provided or syntra.devMode is true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syntra.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "syntra.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The container reads this through env LYCAN_ADMIN_KEY (see
  # deployment.yaml). Rotate by running `helm upgrade` with a new
  # --set syntra.adminToken=<value>; the pod will be rolled because
  # the Deployment carries a checksum annotation pinned to this Secret.
  adminToken: {{ .Values.syntra.adminToken | default "dev-mode-no-token" | quote }}
{{- end }}
