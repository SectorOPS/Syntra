{{- if and (not .Values.syntra.existingSecret) (not .Values.syntra.devMode) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "syntra.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "syntra.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The container reads this through env LYCAN_ADMIN_KEY (see
  # deployment.yaml). Rotate by running `helm upgrade` with a new
  # --set syntra.adminToken=<value>; the pod will be rolled because
  # the Deployment carries a checksum annotation pinned to this Secret.
  #
  # If `syntra.adminToken` is empty we generate a 32-char alphanumeric
  # token via `randAlphaNum`. Note: that value is re-generated on every
  # `helm template`/`helm install` run, so for stable upgrades you
  # should pass --set syntra.adminToken or use existingSecret. This
  # avoids any predictable fallback token (no `dev-mode-no-token`).
  adminToken: {{ .Values.syntra.adminToken | default (randAlphaNum 32) | quote }}
{{- end }}
