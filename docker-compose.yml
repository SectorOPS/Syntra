name: syntra

services:
  syntra:
    build:
      # Build context is this repo root (Syntra/). Lycan/ is at Syntra/Lycan/
      # since the vendor merge, so the Dockerfile copies Lycan/, src/, tests/,
      # Cargo.toml, Cargo.lock relative to here (same pattern as
      # docker/Dockerfile.demo).
      context: .
      dockerfile: Dockerfile
    image: syntra
    container_name: syntra
    ports:
      - "8787:8787"
    volumes:
      - syntra-store:/var/lib/syntra
    environment:
      - LYCAN_ADMIN_KEY=${LYCAN_ADMIN_KEY:?Set LYCAN_ADMIN_KEY in .env or environment}
    command: ["serve", "--addr", "0.0.0.0:8787", "--store", "/var/lib/syntra"]
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  syntra-store:
